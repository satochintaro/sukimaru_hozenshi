<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>スキマル保全士 マネージャー Ver 4.7.1</title><link rel="stylesheet" href="./styles.css"><meta name="theme-color" content="#26323d"></head>
<body class="manager-body"><main class="admin-main"><header class="hd manager-header"><a class="hd-back role-home-link" href="./index.html" aria-label="役割選択へ戻る">‹</a><div class="manager-header-title"><div class="hd-ttl">スキマル保全士</div><div class="hd-sub">MANAGER ／ 提出・集計・AI教育提案</div></div><button class="manager-logout" id="logout" aria-label="マネージャーからログアウト">退出</button><button class="manager-refresh" id="refresh" aria-label="提出データを更新">↻</button></header>
<div class="pad manager-pad"><div class="manager-connection"><span class="connection-dot" id="connection-dot"></span><span id="connection-text">認証を確認中</span><b id="submission-count">0件</b></div><div class="acts manager-actions"><button class="btn-g" id="csv-learners">提出一覧CSV</button><button class="btn-g" id="clear">提出データを削除</button></div><div id="ad-rep" class="scroll manager-report"></div><div class="toast" id="toast" role="status" aria-live="polite"></div></div></main>
<div class="manager-login" id="manager-login" role="dialog" aria-modal="true" aria-labelledby="login-title"><div class="manager-login-card"><div class="manager-login-icon">🔐</div><h1 id="login-title">マネージャー認証</h1><p>個人名と成績を含むため、管理者PINを入力してください。</p><label for="manager-pin">マネージャーPIN</label><input id="manager-pin" type="password" inputmode="numeric" autocomplete="current-password" maxlength="10" placeholder="PINを入力"><button class="btn" id="login-btn">ログイン</button><div class="manager-login-message" id="login-message"></div><small>PINはサーバーPCの黒い画面または manager-pin.txt で確認できます。<br>アドレスが <b>http://localhost:8787/admin.html</b> になっていることを確認してください。</small></div></div>
<script src="./admin.js"></script></body></html>
